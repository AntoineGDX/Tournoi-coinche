<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Admin — C'est Coinché !</title>
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/site.css">
</head>
<body>

<!-- ---- Nav ---- -->
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html" style="text-decoration:none;color:inherit">
      <span class="sq">C</span>
      <span>C'EST COINCHÉ!</span>
    </a>
    <div class="nav-links">
      <a href="arbre.html">← Retour à l'arbre</a>
    </div>
    <div style="display:flex;gap:10px">
      <button class="nav-cta outline hidden" id="nav-logout">Déconnexion</button>
    </div>
  </div>
</nav>

<!-- ---- Page hero ---- -->
<section class="page-hero">
  <span class="eyebrow">Admin</span>
  <h1>Gestion du<br>tournoi.</h1>
  <p>Édite l'arbre et les scores en direct, et suis les paiements des inscriptions.</p>
</section>

<!-- ---- Admin ---- -->
<section class="admin">
  <div class="wrap">

    <div class="admin-gate" id="admin-gate">
      <h3 style="color:var(--cc-jaune);margin-bottom:6px">Connexion admin</h3>
      <label>EMAIL</label>
      <input type="email" id="admin-email" autocomplete="username">
      <label>MOT DE PASSE</label>
      <input type="password" id="admin-password" autocomplete="current-password">
      <button class="btn" id="admin-connect">SE CONNECTER</button>
      <p id="admin-gate-status" class="admin-status"></p>
    </div>

    <div class="admin-editor hidden" id="admin-editor">

      <h3 style="margin-bottom:10px">Arbre du tournoi</h3>
      <datalist id="admin-team-names"></datalist>
      <div id="admin-rounds"></div>
      <div class="admin-actions">
        <button class="btn lg" id="admin-save">ENREGISTRER LES RÉSULTATS</button>
      </div>
      <p id="admin-save-status" class="admin-status" style="margin-top:14px"></p>

      <h3 style="margin:40px 0 10px">Inscriptions &amp; paiements</h3>
      <div class="admin-teams" id="admin-teams"></div>
      <p id="admin-teams-status" class="admin-status"></p>

      <h3 style="margin:40px 0 10px">Demandes de binôme</h3>
      <div class="admin-requests" id="admin-requests"></div>
      <p id="admin-requests-status" class="admin-status"></p>

      <h3 style="margin:40px 0 10px">Produits / Shop</h3>
      <div class="admin-products" id="admin-products"></div>
      <div class="admin-product-new">
        <h4 style="margin:0 0 10px">Ajouter un article</h4>
        <div class="fields">
          <input type="text" id="new-product-name" placeholder="Nom (ex: Wordmark)">
          <input type="number" id="new-product-price" placeholder="Prix (€)">
          <input type="text" id="new-product-slug" placeholder="Slug (ex: wordmark)">
          <input type="text" id="new-product-sizes" placeholder="Tailles (ex: S,M,L,XL)">
          <textarea id="new-product-description" placeholder="Description"></textarea>
          <input type="text" id="new-product-visual-text" placeholder="Visuel : texte (ex: C'est&lt;br&gt;coinché.)">
          <input type="text" id="new-product-visual-subtitle" placeholder="Visuel : sous-titre">
          <select id="new-product-visual-bg">
            <option value="y">Fond jaune</option>
            <option value="n">Fond noir</option>
            <option value="w">Fond blanc</option>
          </select>
          <input type="file" id="new-product-image" accept="image/*">
        </div>
        <button class="btn" id="add-product" style="margin-top:12px">AJOUTER L'ARTICLE</button>
      </div>
      <p id="admin-products-status" class="admin-status" style="margin-top:10px"></p>

    </div>

  </div>
</section>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/player.js"></script>
<script src="js/admin.js"></script>
<script src="js/newsletter.js"></script>
</body>
</html>
