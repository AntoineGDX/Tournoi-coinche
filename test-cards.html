<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Test cartes GSAP</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07090a; font-family:sans-serif; }

.spacer {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,.25);
  font-size:13px;
  letter-spacing:.2em;
  text-transform:uppercase;
}

#cards-section {
  position:relative;
  height:100vh;
  overflow:hidden;
  background:#07090a;
}

#stage {
  position:absolute;
  inset:0;
  perspective:1000px;
  perspective-origin:50% 50%;
  transform-style:preserve-3d;
}

.fly-card {
  position:absolute;
  left:50%; top:50%;
  width:190px; height:266px;
  margin-left:-95px; margin-top:-133px;
  border-radius:14px;
  border:3px solid;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  opacity:0;
  will-change:transform,opacity;
  backface-visibility:visible;
}
.fy { background:#f5c842; border-color:#1a1a1a; color:#1a1a1a; }
.fn { background:#1a1a1a; border-color:#f5c842; color:#f5c842; }

.fly-card .corner {
  position:absolute;
  font-size:14px;
  font-weight:800;
  line-height:1.2;
  text-align:center;
}
.tl { top:10px; left:12px; }
.br { bottom:10px; right:12px; transform:rotate(180deg); }

.fly-card .suit { font-size:60px; line-height:1; }
.fly-card .info {
  font-size:16px;
  font-weight:700;
  text-align:center;
  line-height:1.4;
  padding:0 14px;
  text-transform:uppercase;
  letter-spacing:.04em;
}

#vignette {
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 75% 65% at 50% 50%, transparent 35%, #07090a 100%);
  pointer-events:none;
  z-index:10;
}

#label {
  position:absolute;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  letter-spacing:.22em;
  color:rgba(255,255,255,.18);
  text-transform:uppercase;
  z-index:20;
  white-space:nowrap;
}

#dots {
  position:absolute;
  right:24px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:20;
}
.dot {
  width:6px; height:6px;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  transition:background .3s, transform .3s;
}
.dot.on { background:#f5c842; transform:scale(1.6); }
</style>
</head>
<body>

<div class="spacer">↓ Scroll pour voir l'animation</div>

<section id="cards-section">
  <div id="stage">

    <div class="fly-card fy" id="c1">
      <div class="corner tl">A<br>♠</div>
      <div class="suit">♠</div>
      <div class="info">13 & 14<br>juin 2026</div>
      <div class="corner br">A<br>♠</div>
    </div>

    <div class="fly-card fn" id="c2">
      <div class="corner tl" style="color:#f5c842">A<br>♥</div>
      <div class="suit" style="color:#f5c842">♥</div>
      <div class="info" style="color:#f5c842">Le 109<br>Nice</div>
      <div class="corner br" style="color:#f5c842">A<br>♥</div>
    </div>

    <div class="fly-card fy" id="c3">
      <div class="corner tl">A<br>♦</div>
      <div class="suit">♦</div>
      <div class="info">Doublette<br>· 20€ ·</div>
      <div class="corner br">A<br>♦</div>
    </div>

    <div class="fly-card fn" id="c4">
      <div class="corner tl" style="color:#f5c842">A<br>♣</div>
      <div class="suit" style="color:#f5c842">♣</div>
      <div class="info" style="color:#f5c842">DJ Set<br>Buvette</div>
      <div class="corner br" style="color:#f5c842">A<br>♣</div>
    </div>

  </div>

  <div id="vignette"></div>
  <div id="dots">
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
  </div>
  <div id="label">C'EST COINCHÉ · Nice · 1ère édition</div>
</section>

<div class="spacer">La suite du site ↓</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

const VW = window.innerWidth;
const VH = window.innerHeight;

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: '#cards-section',
    start: 'top top',
    end: '+=500%',
    scrub: 1.4,
    pin: true,
    anticipatePin: 1,
    onUpdate: self => {
      const p = self.progress;
      [
        [0.10, 0.32],
        [0.33, 0.55],
        [0.56, 0.77],
        [0.78, 0.98],
      ].forEach(([a, b], i) => {
        document.getElementById('d'+(i+1)).classList.toggle('on', p >= a && p <= b);
      });
    }
  }
});

/* ---- Durées ---- */
const fly   = 0.20;   // vol jusqu'au centre
const read  = 0.18;   // pause lisible
const leave = 0.20;   // départ

/* Carte 1 — vient de gauche en tournant sur X+Z, repart à droite en dessous */
tl
  .fromTo('#c1',
    { x:-VW*1.2, y: VH*0.3,  z:-500, rotateX: 80, rotateY:-40, rotateZ:-200, opacity:0 },
    { x: 0,      y: 0,        z: 0,   rotateX:  0, rotateY:  0, rotateZ: -4,  opacity:1, duration:fly, ease:'power2.out' })
  .to('#c1', { duration:read })
  .to('#c1',
    { x: VW*1.2, y: VH*0.25, z:-300, rotateX:-50, rotateY: 60, rotateZ: 180, opacity:0, duration:leave, ease:'power2.in' })

/* Carte 2 — vient d'en haut à droite avec spin Y complet, repart bas-gauche */
  .fromTo('#c2',
    { x: VW*0.9, y:-VH*1.1, z:-400, rotateX:-120, rotateY: 200, rotateZ: 60, opacity:0 },
    { x: 0,      y: 0,       z: 0,   rotateX:   0, rotateY:   0, rotateZ:  5, opacity:1, duration:fly, ease:'power2.out' })
  .to('#c2', { duration:read })
  .to('#c2',
    { x:-VW*1.0, y: VH*0.9, z:-200, rotateX: 70, rotateY:-180, rotateZ:-140, opacity:0, duration:leave, ease:'power2.in' })

/* Carte 3 — vient de droite en plongée Z + spin X, repart en haut à gauche */
  .fromTo('#c3',
    { x: VW*1.1, y:-VH*0.2, z:-900, rotateX: 160, rotateY: 60, rotateZ: 120, opacity:0 },
    { x: 0,      y: 0,       z: 0,   rotateX:   0, rotateY:  0, rotateZ:  -3, opacity:1, duration:fly, ease:'power3.out' })
  .to('#c3', { duration:read })
  .to('#c3',
    { x:-VW*0.9, y:-VH*0.8, z:-200, rotateX:-100, rotateY:-80, rotateZ:-160, opacity:0, duration:leave, ease:'power2.in' })

/* Carte 4 — vient d'en bas à gauche avec triple spin, repart droite */
  .fromTo('#c4',
    { x:-VW*0.5, y: VH*1.2, z:-600, rotateX: 220, rotateY:-160, rotateZ:-80, opacity:0 },
    { x: 0,      y: 0,       z: 0,   rotateX:   0, rotateY:   0, rotateZ:  4, opacity:1, duration:fly, ease:'power3.out' })
  .to('#c4', { duration:read })
  .to('#c4',
    { x: VW*1.2, y:-VH*0.3, z:-100, rotateX: 60, rotateY: 140, rotateZ: 200, opacity:0, duration:leave, ease:'power2.in' });
</script>
</body>
</html>
