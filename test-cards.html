<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Test cartes GSAP</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07090a; font-family:sans-serif; }

.spacer {
  height:100vh;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,.22); font-size:13px;
  letter-spacing:.2em; text-transform:uppercase;
}

#cards-section {
  position:relative;
  height:100vh;
  overflow:hidden;
  background:#07090a;
}

#stage {
  position:absolute; inset:0;
  perspective:700px;
  perspective-origin:50% 50%;
}

.fc {
  position:absolute;
  left:50%; top:50%;
  width:180px; height:252px;
  margin-left:-90px; margin-top:-126px;
  border-radius:14px;
  border:3px solid;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:10px;
  opacity:0;
  will-change:transform,opacity;
  transform-style:preserve-3d;
  backface-visibility:visible;
}
.fy { background:#f5c842; border-color:#1a1a1a; color:#1a1a1a; }
.fn { background:#1a1a1a; border-color:#f5c842; color:#f5c842; }

.fc .cn { position:absolute; font-size:13px; font-weight:800; line-height:1.2; text-align:center; }
.cn.tl { top:10px; left:12px; }
.cn.br { bottom:10px; right:12px; transform:rotate(180deg); }
.fc .suit { font-size:56px; line-height:1; }
.fc .info { font-size:15px; font-weight:700; text-align:center; line-height:1.4; padding:0 12px; text-transform:uppercase; letter-spacing:.04em; }

#vignette {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 70% at 50% 50%, transparent 30%, #07090a 100%);
  pointer-events:none; z-index:10;
}
#label {
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:.24em; color:rgba(255,255,255,.15);
  text-transform:uppercase; z-index:20; white-space:nowrap;
}
</style>
</head>
<body>

<div class="spacer">↓ Scroll pour voir l'animation</div>

<section id="cards-section">
  <div id="stage">

    <div class="fc fy" id="c1">
      <div class="cn tl">A<br>♠</div>
      <div class="suit">♠</div>
      <div class="info">13 & 14<br>juin 2026</div>
      <div class="cn br">A<br>♠</div>
    </div>

    <div class="fc fn" id="c2">
      <div class="cn tl" style="color:#f5c842">A<br>♥</div>
      <div class="suit" style="color:#f5c842">♥</div>
      <div class="info" style="color:#f5c842">Le 109<br>Nice</div>
      <div class="cn br" style="color:#f5c842">A<br>♥</div>
    </div>

    <div class="fc fy" id="c3">
      <div class="cn tl">A<br>♦</div>
      <div class="suit">♦</div>
      <div class="info">Doublette<br>· 20€ ·</div>
      <div class="cn br">A<br>♦</div>
    </div>

    <div class="fc fn" id="c4">
      <div class="cn tl" style="color:#f5c842">A<br>♣</div>
      <div class="suit" style="color:#f5c842">♣</div>
      <div class="info" style="color:#f5c842">DJ Set<br>Buvette</div>
      <div class="cn br" style="color:#f5c842">A<br>♣</div>
    </div>

    <!-- Cartes fantômes supplémentaires pour remplir l'espace -->
    <div class="fc fy" id="c5" style="opacity:0">
      <div class="cn tl">2<br>♠</div>
      <div class="suit">♠</div>
      <div class="cn br">2<br>♠</div>
    </div>
    <div class="fc fn" id="c6" style="opacity:0">
      <div class="cn tl" style="color:#f5c842">K<br>♥</div>
      <div class="suit" style="color:#f5c842">♥</div>
      <div class="cn br" style="color:#f5c842">K<br>♥</div>
    </div>

  </div>
  <div id="vignette"></div>
  <div id="label">C'EST COINCHÉ · Nice · 1ère édition</div>
</section>

<div class="spacer">La suite du site ↓</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: '#cards-section',
    start: 'top top',
    end: '+=600%',
    scrub: 1.8,
    pin: true,
    anticipatePin: 1,
  }
});

/* Chaque carte part de très loin (z négatif énorme) et traverse la caméra
   vers z positif. x/y varient pour des trajectoires différentes.
   Les positions de départ sont décalées dans la timeline pour qu'on voit
   plusieurs cartes à la fois à des profondeurs différentes.
   rotateX/Y/Z : vrille intense en vol. */

const D  = 0.55;  // durée du voyage complet de chaque carte
const OV = 0.28;  // overlap : plusieurs cartes visibles en même temps

/* Carte fantôme 1 — apparaît en premier, toute petite au loin */
tl.set('#c5', { x: -120, y:  60, z:-5500, rotateX: 40, rotateY:-80, rotateZ: 30, opacity:0 })
  .to('#c5',  { x: -300, y:  180, z: 1400, rotateX:140, rotateY: 60, rotateZ:200, opacity:0.6,
                duration: D, ease:'none' }, 0)
  .to('#c5',  { opacity:0, duration:0.05 }, D - 0.05)

/* Carte 1 ♠ — décalée, démarre alors que c5 est encore là */
  .set('#c1', { x:  200, y: -80, z:-4800, rotateX:-60, rotateY: 120, rotateZ:-40, opacity:0 })
  .to('#c1',  { x:  500, y:-200, z: 1200, rotateX: 80, rotateY:-200, rotateZ: 160, opacity:1,
                duration: D, ease:'none' }, OV)
  .to('#c1',  { opacity:0, duration:0.05 }, OV + D - 0.05)

/* Carte fantôme 2 — croise la carte 1 */
  .set('#c6', { x: -300, y: 140, z:-6000, rotateX: 100, rotateY:  40, rotateZ: 80, opacity:0 })
  .to('#c6',  { x: -600, y: 300, z: 1600, rotateX: 260, rotateY:-120, rotateZ:-60, opacity:0.5,
                duration: D, ease:'none' }, OV * 1.8)
  .to('#c6',  { opacity:0, duration:0.05 }, OV * 1.8 + D - 0.05)

/* Carte 2 ♥ */
  .set('#c2', { x: -250, y: 200, z:-5200, rotateX:  80, rotateY:-60,  rotateZ: 120, opacity:0 })
  .to('#c2',  { x: -700, y: 450, z: 1300, rotateX:-140, rotateY:240,  rotateZ:-80,  opacity:1,
                duration: D, ease:'none' }, OV * 2.6)
  .to('#c2',  { opacity:0, duration:0.05 }, OV * 2.6 + D - 0.05)

/* Carte 3 ♦ */
  .set('#c3', { x:  300, y: 100, z:-5800, rotateX:-100, rotateY:160, rotateZ:-60,  opacity:0 })
  .to('#c3',  { x:  650, y: 250, z: 1500, rotateX: 180, rotateY:-80, rotateZ: 240, opacity:1,
                duration: D, ease:'none' }, OV * 3.4)
  .to('#c3',  { opacity:0, duration:0.05 }, OV * 3.4 + D - 0.05)

/* Carte 4 ♣ */
  .set('#c4', { x: -100, y:-220, z:-5000, rotateX: 140, rotateY:-200, rotateZ:100, opacity:0 })
  .to('#c4',  { x: -200, y:-500, z: 1400, rotateX:-60,  rotateY: 100, rotateZ:-180,opacity:1,
                duration: D, ease:'none' }, OV * 4.2)
  .to('#c4',  { opacity:0, duration:0.05 }, OV * 4.2 + D - 0.05);
</script>
</body>
</html>
