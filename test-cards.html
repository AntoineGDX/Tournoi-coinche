<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Test cartes GSAP</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; font-family: sans-serif; }

  .spacer { height: 100vh; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.3); font-size:14px; letter-spacing:.2em; text-transform:uppercase; }

  /* ---- Section cartes ---- */
  #cards-section {
    position: relative;
    height: 100vh;
    overflow: hidden;
    background: #07090a;
  }

  #cards-stage {
    position: absolute;
    inset: 0;
    perspective: 1100px;
    perspective-origin: 50% 50%;
  }

  .fly-card {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 200px;
    height: 280px;
    margin-left: -100px;
    margin-top: -140px;
    border-radius: 16px;
    border: 3px solid;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    opacity: 0;
    will-change: transform, opacity;
    pointer-events: none;
  }

  .fly-card.yellow { background: #f5c842; border-color: #1a1a1a; color: #1a1a1a; }
  .fly-card.black  { background: #1a1a1a; border-color: #f5c842; color: #f5c842; }

  .fly-card .corner {
    position: absolute;
    font-size: 15px;
    font-weight: 800;
    line-height: 1.15;
    text-align: center;
  }
  .fly-card .corner.tl { top: 12px; left: 14px; }
  .fly-card .corner.br { bottom: 12px; right: 14px; transform: rotate(180deg); }

  .fly-card .suit { font-size: 64px; line-height: 1; }

  .fly-card .info {
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    line-height: 1.4;
    padding: 0 16px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  /* Fond étoilé léger */
  #stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 22%, rgba(255,255,255,.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 8%,  rgba(255,255,255,.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 38% 65%, rgba(255,255,255,.2)  0%, transparent 100%),
      radial-gradient(1px 1px at 88% 44%, rgba(255,255,255,.3)  0%, transparent 100%),
      radial-gradient(1px 1px at 6%  80%, rgba(255,255,255,.2)  0%, transparent 100%),
      radial-gradient(1px 1px at 55% 90%, rgba(255,255,255,.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 72%, rgba(255,255,255,.2)  0%, transparent 100%),
      radial-gradient(1px 1px at 28% 35%, rgba(255,255,255,.3)  0%, transparent 100%);
    pointer-events: none;
  }

  #vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 40%, #07090a 100%);
    pointer-events: none;
    z-index: 10;
  }

  #section-label {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: .24em;
    color: rgba(255,255,255,.2);
    text-transform: uppercase;
    z-index: 20;
    white-space: nowrap;
  }

  /* Progress dots */
  #progress-dots {
    position: absolute;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 20;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    transition: background .3s, transform .3s;
  }
  .dot.active {
    background: #f5c842;
    transform: scale(1.5);
  }
</style>
</head>
<body>

<div class="spacer">↓ Scroll pour voir l'animation</div>

<!-- ===== SECTION CARTES ===== -->
<section id="cards-section">
  <div id="stars"></div>

  <div id="cards-stage">

    <!-- Carte 1 : ♠ Date — entre par la gauche, sort par la droite -->
    <div class="fly-card yellow" id="c1">
      <div class="corner tl">A<br>♠</div>
      <div class="suit">♠</div>
      <div class="info">13 & 14<br>juin 2026</div>
      <div class="corner br">A<br>♠</div>
    </div>

    <!-- Carte 2 : ♥ Lieu — entre par en haut à droite, sort par la gauche -->
    <div class="fly-card black" id="c2">
      <div class="corner tl">A<br>♥</div>
      <div class="suit" style="color:#f5c842">♥</div>
      <div class="info">Le 109<br>Nice</div>
      <div class="corner br">A<br>♥</div>
    </div>

    <!-- Carte 3 : ♦ Format — entre par la droite, sort par en haut à gauche -->
    <div class="fly-card yellow" id="c3">
      <div class="corner tl">A<br>♦</div>
      <div class="suit">♦</div>
      <div class="info">Doublette<br>· 20€ ·</div>
      <div class="corner br">A<br>♦</div>
    </div>

    <!-- Carte 4 : ♣ Ambiance — entre par en bas, sort par la droite -->
    <div class="fly-card black" id="c4">
      <div class="corner tl">A<br>♣</div>
      <div class="suit" style="color:#f5c842">♣</div>
      <div class="info">DJ Set<br>Buvette</div>
      <div class="corner br">A<br>♣</div>
    </div>

  </div>

  <div id="vignette"></div>

  <div id="progress-dots">
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
    <div class="dot" id="dot4"></div>
  </div>

  <div id="section-label">C'EST COINCHÉ · Nice · 1ère édition</div>
</section>

<div class="spacer">La suite du site ↓</div>

<!-- ===== GSAP ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

const W = window.innerWidth;
const H = window.innerHeight;

// La section est pinnée pendant 4x la hauteur de la fenêtre
const tl = gsap.timeline({
  scrollTrigger: {
    trigger: '#cards-section',
    start: 'top top',
    end: '+=400%',
    scrub: 1.2,
    pin: true,
    anticipatePin: 1,
    onUpdate: self => updateDots(self.progress),
  }
});

// ---- Carte 1 : entre gauche, lisible au centre, sort droite ----
tl.set('#c1', { x: -W * 1.1, y: H * 0.08, z: 0, rotateX: 0, rotateY: -60, rotateZ: -25, opacity: 0 })
  .to('#c1', {
    x: -W * 1.1, y: H * 0.08, z: 0, rotateX: 0, rotateY: -60, rotateZ: -25, opacity: 0,
    duration: 0.01
  })
  // Arrive au centre avec spin
  .to('#c1', {
    x: 0, y: 0, z: 0,
    rotateX: 0, rotateY: 0, rotateZ: -3,
    opacity: 1,
    duration: 0.22, ease: 'power2.out'
  })
  // Pause lisible
  .to('#c1', { duration: 0.14 })
  // Sort par la droite avec spin
  .to('#c1', {
    x: W * 1.1, y: -H * 0.1, z: 0,
    rotateX: 10, rotateY: 50, rotateZ: 18,
    opacity: 0,
    duration: 0.22, ease: 'power2.in'
  })

// ---- Carte 2 : entre haut-droite, sort bas-gauche ----
  .set('#c2', { x: W * 0.7, y: -H * 0.9, z: 200, rotateX: -40, rotateY: 30, rotateZ: 25, opacity: 0 })
  .to('#c2', {
    x: 0, y: 0, z: 0,
    rotateX: 0, rotateY: 0, rotateZ: 4,
    opacity: 1,
    duration: 0.22, ease: 'power2.out'
  })
  .to('#c2', { duration: 0.14 })
  .to('#c2', {
    x: -W * 0.9, y: H * 0.7, z: -100,
    rotateX: 30, rotateY: -40, rotateZ: -20,
    opacity: 0,
    duration: 0.22, ease: 'power2.in'
  })

// ---- Carte 3 : entre droite avec plongée Z, sort gauche ----
  .set('#c3', { x: W * 1.2, y: H * 0.05, z: -600, rotateX: 20, rotateY: 60, rotateZ: 30, opacity: 0 })
  .to('#c3', {
    x: 0, y: 0, z: 0,
    rotateX: 0, rotateY: 0, rotateZ: -5,
    opacity: 1,
    duration: 0.22, ease: 'power2.out'
  })
  .to('#c3', { duration: 0.14 })
  .to('#c3', {
    x: -W * 1.1, y: H * 0.05, z: 0,
    rotateX: -10, rotateY: -55, rotateZ: -22,
    opacity: 0,
    duration: 0.22, ease: 'power2.in'
  })

// ---- Carte 4 : entre bas avec spin complet, sort haut-droite ----
  .set('#c4', { x: -W * 0.3, y: H * 1.0, z: -300, rotateX: 60, rotateY: -30, rotateZ: -40, opacity: 0 })
  .to('#c4', {
    x: 0, y: 0, z: 0,
    rotateX: 0, rotateY: 0, rotateZ: 3,
    opacity: 1,
    duration: 0.22, ease: 'power2.out'
  })
  .to('#c4', { duration: 0.18 })
  .to('#c4', {
    x: W * 0.8, y: -H * 0.8, z: 0,
    rotateX: -40, rotateY: 45, rotateZ: 28,
    opacity: 0,
    duration: 0.22, ease: 'power2.in'
  });

// ---- Points de progression ----
function updateDots(progress) {
  const steps = [0.12, 0.37, 0.62, 0.87];
  steps.forEach((threshold, i) => {
    const dot = document.getElementById('dot' + (i+1));
    const isActive = progress >= threshold - 0.15 && progress <= threshold + 0.15;
    dot.classList.toggle('active', isActive);
  });
}
</script>
</body>
</html>
