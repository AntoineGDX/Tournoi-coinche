<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Test cartes GSAP</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07090a; font-family:sans-serif; }
.spacer {
  height:100vh;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,.22); font-size:13px;
  letter-spacing:.2em; text-transform:uppercase;
}
#cards-section {
  position:relative; height:100vh; overflow:hidden; background:#07090a;
}
#stage {
  position:absolute; inset:0;
  perspective:900px;
  perspective-origin:50% 50%;
}
.fc {
  position:absolute;
  left:50%; top:50%;
  width:160px; height:224px;
  margin-left:-80px; margin-top:-112px;
  border-radius:14px; border:3px solid;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  opacity:0; will-change:transform,opacity;
}
.fy { background:#f5c842; border-color:#1a1a1a; color:#1a1a1a; }
.fn { background:#1a1a1a; border-color:#f5c842; color:#f5c842; }
.fc .cn { position:absolute; font-size:12px; font-weight:800; line-height:1.2; text-align:center; }
.cn.tl { top:9px; left:11px; }
.cn.br { bottom:9px; right:11px; transform:rotate(180deg); }
.fc .suit { font-size:52px; line-height:1; }
.fc .info { font-size:13px; font-weight:700; text-align:center; line-height:1.4; padding:0 10px; text-transform:uppercase; letter-spacing:.05em; }

#vignette {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 90% 80% at 50% 50%, transparent 20%, #07090a 100%);
  pointer-events:none; z-index:10;
}
#label {
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:.24em; color:rgba(255,255,255,.15);
  text-transform:uppercase; z-index:20; white-space:nowrap;
}
</style>
</head>
<body>

<div class="spacer">↓ Scroll pour voir l'animation</div>

<section id="cards-section">
  <div id="stage">

    <div class="fc fy" id="c1">
      <div class="cn tl">A<br>♠</div>
      <div class="suit">♠</div>
      <div class="info">13 & 14<br>juin 2026</div>
      <div class="cn br">A<br>♠</div>
    </div>

    <div class="fc fn" id="c2">
      <div class="cn tl" style="color:#f5c842">A<br>♥</div>
      <div class="suit" style="color:#f5c842">♥</div>
      <div class="info" style="color:#f5c842">Le 109<br>Nice</div>
      <div class="cn br" style="color:#f5c842">A<br>♥</div>
    </div>

    <div class="fc fy" id="c3">
      <div class="cn tl">A<br>♦</div>
      <div class="suit">♦</div>
      <div class="info">Doublette<br>· 20€ ·</div>
      <div class="cn br">A<br>♦</div>
    </div>

    <div class="fc fn" id="c4">
      <div class="cn tl" style="color:#f5c842">A<br>♣</div>
      <div class="suit" style="color:#f5c842">♣</div>
      <div class="info" style="color:#f5c842">DJ Set<br>Buvette</div>
      <div class="cn br" style="color:#f5c842">A<br>♣</div>
    </div>

  </div>
  <div id="vignette"></div>
  <div id="label">C'EST COINCHÉ · Nice · 1ère édition</div>
</section>

<div class="spacer">La suite du site ↓</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

/*
  3 phases :
  A — ARRIVÉE  (rapide) : chaque carte vient d'un coin différent, loin et petite
  B — VITRINE  (lente)  : toutes les 4 côte à côte, même taille, bien lisibles
                          Cette phase occupe ~40% du scroll total → sensation de pause
  C — DÉPART   (rapide) : chaque carte repart en vrille dans une direction différente

  Positions côte à côte (4 cartes 160px + 20px gap = 740px total) :
    c1 : x = -285   c2 : x = -95   c3 : x = +95   c4 : x = +285
*/

const IN   = 0.22;   // durée arrivée
const HOLD = 0.44;   // durée vitrine (longue = scroll lent = lisible)
const OUT  = 0.18;   // durée départ

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: '#cards-section',
    start: 'top top',
    end: '+=550%',
    scrub: 1.5,
    pin: true,
    anticipatePin: 1,
  }
});

/* ---- ARRIVÉE : toutes en même temps, depuis des profondeurs / coins différents ---- */
tl
  // c1 : vient du fond à gauche
  .set('#c1', { x:-900, y: 300, z:-7000, rotateX: 50, rotateY:-150, rotateZ:-80, opacity:0 })
  .to('#c1',  { x:-285, y:   0, z:    0, rotateX:  0, rotateY:   0, rotateZ: -4, opacity:1,
                duration:IN, ease:'power3.out' }, 0)

  // c2 : vient du fond en haut à droite, encore plus loin
  .set('#c2', { x: 700, y:-500, z:-11000, rotateX:-80, rotateY: 200, rotateZ: 100, opacity:0 })
  .to('#c2',  { x: -95, y:   0, z:     0, rotateX:  0, rotateY:   0, rotateZ:  3, opacity:1,
                duration:IN, ease:'power3.out' }, 0)

  // c3 : vient du fond en bas
  .set('#c3', { x: 100, y: 700, z:-5500, rotateX: 120, rotateY:  60, rotateZ:  60, opacity:0 })
  .to('#c3',  { x:  95, y:   0, z:    0, rotateX:   0, rotateY:   0, rotateZ: -3, opacity:1,
                duration:IN, ease:'power3.out' }, 0)

  // c4 : vient du fond à droite, distance intermédiaire
  .set('#c4', { x: 950, y:-200, z:-8500, rotateX:-60, rotateY:-180, rotateZ:-120, opacity:0 })
  .to('#c4',  { x: 285, y:   0, z:    0, rotateX:  0, rotateY:   0, rotateZ:  5, opacity:1,
                duration:IN, ease:'power3.out' }, 0)

/* ---- VITRINE : quasi immobiles, légère dérive — le scroll est lent ici ---- */
  .to('#c1', { x:-285, y: 0, z:0, rotateZ:-4, duration:HOLD, ease:'none' }, IN)
  .to('#c2', { x: -95, y: 0, z:0, rotateZ: 3, duration:HOLD, ease:'none' }, IN)
  .to('#c3', { x:  95, y: 0, z:0, rotateZ:-3, duration:HOLD, ease:'none' }, IN)
  .to('#c4', { x: 285, y: 0, z:0, rotateZ: 5, duration:HOLD, ease:'none' }, IN)

/* ---- DÉPART : chacune repart en vrille dans une direction différente ---- */
  .to('#c1', { x:-1100, y:-400, z: 800, rotateX:-120, rotateY: 200, rotateZ:-200, opacity:0,
               duration:OUT, ease:'power3.in' }, IN + HOLD)
  .to('#c2', { x:  400, y: 800, z:1200, rotateX: 160, rotateY:-140, rotateZ: 180, opacity:0,
               duration:OUT, ease:'power3.in' }, IN + HOLD)
  .to('#c3', { x: -300, y:-700, z: 900, rotateX:-200, rotateY: 100, rotateZ:-160, opacity:0,
               duration:OUT, ease:'power3.in' }, IN + HOLD)
  .to('#c4', { x: 1100, y: 300, z:1000, rotateX: 100, rotateY:-220, rotateZ: 220, opacity:0,
               duration:OUT, ease:'power3.in' }, IN + HOLD);
</script>
</body>
</html>
