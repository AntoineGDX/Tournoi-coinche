<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Test cartes GSAP</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07090a; font-family:sans-serif; }
.spacer {
  height:100vh;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,.22); font-size:13px;
  letter-spacing:.2em; text-transform:uppercase;
}
#cards-section {
  position:relative; height:100vh; overflow:hidden; background:#07090a;
}
#stage {
  position:absolute; inset:0;
  perspective:800px;
  perspective-origin:50% 50%;
}
.fc {
  position:absolute;
  left:50%; top:50%;
  width:180px; height:252px;
  margin-left:-90px; margin-top:-126px;
  border-radius:14px; border:3px solid;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  opacity:0; will-change:transform,opacity;
}
.fy { background:#f5c842; border-color:#1a1a1a; color:#1a1a1a; }
.fn { background:#1a1a1a; border-color:#f5c842; color:#f5c842; }
.fc .cn { position:absolute; font-size:13px; font-weight:800; line-height:1.2; text-align:center; }
.cn.tl { top:10px; left:12px; }
.cn.br { bottom:10px; right:12px; transform:rotate(180deg); }
.fc .suit { font-size:56px; line-height:1; }
.fc .info { font-size:15px; font-weight:700; text-align:center; line-height:1.4; padding:0 12px; text-transform:uppercase; letter-spacing:.04em; }
#vignette {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 85% 75% at 50% 50%, transparent 25%, #07090a 100%);
  pointer-events:none; z-index:10;
}
#label {
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:.24em; color:rgba(255,255,255,.15);
  text-transform:uppercase; z-index:20; white-space:nowrap;
}
</style>
</head>
<body>

<div class="spacer">↓ Scroll pour voir l'animation</div>

<section id="cards-section">
  <div id="stage">

    <!-- Carte 1 ♠ : entre bas-gauche → sort haut-droite -->
    <div class="fc fy" id="c1">
      <div class="cn tl">A<br>♠</div>
      <div class="suit">♠</div>
      <div class="info">13 & 14<br>juin 2026</div>
      <div class="cn br">A<br>♠</div>
    </div>

    <!-- Carte 2 ♥ : entre haut-droite → sort bas-gauche -->
    <div class="fc fn" id="c2">
      <div class="cn tl" style="color:#f5c842">A<br>♥</div>
      <div class="suit" style="color:#f5c842">♥</div>
      <div class="info" style="color:#f5c842">Le 109<br>Nice</div>
      <div class="cn br" style="color:#f5c842">A<br>♥</div>
    </div>

    <!-- Carte 3 ♦ : entre droite → sort gauche -->
    <div class="fc fy" id="c3">
      <div class="cn tl">A<br>♦</div>
      <div class="suit">♦</div>
      <div class="info">Doublette<br>· 20€ ·</div>
      <div class="cn br">A<br>♦</div>
    </div>

    <!-- Carte 4 ♣ : entre bas-droite → sort haut-gauche -->
    <div class="fc fn" id="c4">
      <div class="cn tl" style="color:#f5c842">A<br>♣</div>
      <div class="suit" style="color:#f5c842">♣</div>
      <div class="info" style="color:#f5c842">DJ Set<br>Buvette</div>
      <div class="cn br" style="color:#f5c842">A<br>♣</div>
    </div>

  </div>
  <div id="vignette"></div>
  <div id="label">C'EST COINCHÉ · Nice · 1ère édition</div>
</section>

<div class="spacer">La suite du site ↓</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: '#cards-section',
    start: 'top top',
    end: '+=500%',
    scrub: 1.6,
    pin: true,
    anticipatePin: 1,
  }
});

/*
  Chaque carte fait un voyage en 3 étapes :
  1. LOIN  → minuscule, depuis un coin de l'écran
  2. PRÈS  → taille idéale, passe devant la caméra
  3. SORTIE → grossit encore et sort de l'autre côté

  perspective:800px donc :
    z=-3500 → carte ~18% de sa taille   (minuscule)
    z=-400  → carte ~67% (bonne taille lisible)
    z=+600  → carte 4x sa taille         (énorme, déborde)

  x/y dérivent d'un côté à l'autre pour la trajectoire diagonale.
  rotateX/Y/Z : rotation continue pendant tout le trajet.
  Pas de pause : le scroll contrôle la vitesse, l'utilisateur s'arrête s'il veut lire.
*/

const SEG = 0.28;   // durée d'un segment (en unité timeline)
const GAP = 0.04;   // léger overlap entre cartes

// ---- Carte 1 ♠ : part de relativement près, bas-gauche → haut-droite ----
tl
.set('#c1', { x:-500, y:300, z:-3200, rotateX: 30, rotateY:-120, rotateZ:-50, opacity:0 })
.to('#c1',
  { x: 80,  y:-30,  z:-300, rotateX:-40, rotateY: 80, rotateZ: 60, opacity:1, duration:SEG, ease:'power1.in' })
.to('#c1',
  { x: 700, y:-500, z:1000, rotateX:-120, rotateY:220, rotateZ:160, opacity:0, duration:SEG*0.7, ease:'power2.in' })

// ---- Carte 2 ♥ : part de très loin, haut-droite → bas-gauche ----
.set('#c2', { x:400, y:-220, z:-7500, rotateX:-50, rotateY:150, rotateZ: 70, opacity:0 })
.to('#c2',
  { x:-60, y: 40,  z:-300, rotateX: 60, rotateY:-100, rotateZ:-80, opacity:1, duration:SEG*1.5, ease:'power1.in' },
  SEG * 1.6 + GAP)
.to('#c2',
  { x:-750, y:480, z:1000, rotateX:160, rotateY:-280, rotateZ:-200, opacity:0, duration:SEG*0.7, ease:'power2.in' })

// ---- Carte 3 ♦ : part de distance moyenne, droite → gauche ----
.set('#c3', { x:600, y: 60, z:-5000, rotateX: 80, rotateY: 60, rotateZ:-30, opacity:0 })
.to('#c3',
  { x: 30, y:-20,  z:-300, rotateX:-60, rotateY:-80, rotateZ: 90, opacity:1, duration:SEG*1.2, ease:'power1.in' },
  SEG * 3.8 + GAP * 2)
.to('#c3',
  { x:-800, y: 120, z:1000, rotateX:-180, rotateY:-200, rotateZ:200, opacity:0, duration:SEG*0.7, ease:'power2.in' })

// ---- Carte 4 ♣ : part de très très loin, bas-droite → haut-gauche ----
.set('#c4', { x:300, y:240, z:-9500, rotateX:-70, rotateY:-130, rotateZ:110, opacity:0 })
.to('#c4',
  { x:-50, y: 30, z:-300, rotateX: 80, rotateY: 80, rotateZ:-120, opacity:1, duration:SEG*1.8, ease:'power1.in' },
  SEG * 5.4 + GAP * 3)
.to('#c4',
  { x:-650, y:-420, z:1000, rotateX:200, rotateY:240, rotateZ:-280, opacity:0, duration:SEG*0.7, ease:'power2.in' });
</script>
</body>
</html>
